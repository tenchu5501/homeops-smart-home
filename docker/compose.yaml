services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      TZ: America/Costa_Rica
    volumes:
      - /volume1/docker/homeops-smart-home/config/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro

  tailscale:
    container_name: tailscale
    image: tailscale/tailscale:latest
    hostname: homeops-ugreen-nas
    restart: unless-stopped
    network_mode: host
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_HOSTNAME=homeops-ugreen-nas
      - TS_EXPERIMENTAL_SERVICE_AUTO_ADVERTISEMENT=false
    volumes:
      - /volume1/docker/homeops-smart-home/config/tailscale:/var/lib/tailscale

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - /volume1/docker/homeops-smart-home/config/mosquitto/config:/mosquitto/config
      - /volume1/docker/homeops-smart-home/config/mosquitto/data:/mosquitto/data
      - /volume1/docker/homeops-smart-home/config/mosquitto/log:/mosquitto/log
